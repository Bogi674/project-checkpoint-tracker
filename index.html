<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Project Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --bg:#ececf1; --surface:#fff; --headbg:#f6f6f8;
    --ink:#1c1c1e; --ink2:#3a3a3c; --label:#8a8a8e; --label3:#aeaeb2;
    --line:#e2e2e7; --line2:#d6d6db; --blue:#0a84ff; --indigo:#5e5ce6;
    --green:#2bb24c; --amber:#f0a500; --gray:#8a8a8e; --red:#e24b4a;
    --card-radius:11px;
    --w-no:46px; --w-project:230px; --w-activities:182px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Inter",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  /* ---------- top bar ---------- */
  .topbar{
    flex:0 0 auto; display:flex; align-items:center; gap:12px;
    padding:11px 20px; background:rgba(246,246,248,.85); backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--line); z-index:50;
  }
  .title-block{display:flex; flex-direction:column; gap:1px}
  .title-row{display:flex; align-items:center; gap:8px}
  .title-row h1{font-size:16.5px; font-weight:600; margin:0; letter-spacing:-.02em}
  .ver{font-size:10.5px; font-weight:650; color:var(--indigo); background:#e9e9f8; padding:2px 7px; border-radius:7px; letter-spacing:.01em}
  .subtitle{font-size:11px; color:var(--label); letter-spacing:.01em}
  .topbar .spacer{flex:1}

  /* ---------- connection badge ---------- */
  .conn{display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600;
    padding:5px 11px; border-radius:20px; background:#ececed; color:var(--label); user-select:none; transition:all .2s}
  .conn .conn-dot{width:8px; height:8px; border-radius:50%; background:var(--label3); transition:all .2s}
  .conn.live{background:#e6f6ea; color:#1f8f3c}
  .conn.live .conn-dot{background:var(--green); box-shadow:0 0 0 3px rgba(43,178,76,.18)}
  .conn.cached{background:#fff4df; color:#9a6a00}
  .conn.cached .conn-dot{background:var(--amber)}
  .conn.offline{background:#fdecec; color:#b5302f}
  .conn.offline .conn-dot{background:var(--red)}
  .conn.connecting .conn-dot{animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

  .btn{
    display:inline-flex; align-items:center; gap:6px; border:none; cursor:pointer;
    font:inherit; font-size:13.5px; font-weight:550; padding:7px 13px; border-radius:9px;
    transition:transform .08s, background .15s; line-height:1;
  }
  .btn:active{transform:scale(.96)}
  .btn-light{background:#e9e9ee; color:var(--ink)}
  .btn-light:hover{background:#e1e1e8}
  .btn-primary{background:var(--indigo); color:#fff}
  .btn-primary:hover{filter:brightness(1.05)}
  .btn .ic{display:inline-flex; width:15px; height:15px}
  .btn .ic svg{width:100%; height:100%}

  /* ---------- single scroll container ---------- */
  .wrap{flex:1 1 auto; overflow:auto; padding:0 16px 80px; position:relative}

  table.grid{border-collapse:separate; border-spacing:0; table-layout:fixed; width:max-content; min-width:100%}
  table.grid th, table.grid td{
    border-right:1px solid var(--line); border-bottom:1px solid var(--line);
    padding:10px 12px; font-size:13.5px; vertical-align:top; background:var(--surface);
  }
  table.grid td{overflow:hidden}

  /* ---------- header ---------- */
  thead .grp th, thead .sub th, thead .cp-collapsed-h{position:sticky; background:var(--headbg)}
  thead .grp th{
    top:0; z-index:40; height:34px; padding:0 12px;
    color:var(--label); font-weight:600; font-size:11.5px; letter-spacing:.02em;
    text-transform:uppercase; vertical-align:middle; white-space:nowrap; overflow:hidden;
    border-top:1px solid var(--line); border-bottom:1px solid var(--line);
  }
  thead .sub th{
    top:34px; z-index:40; height:30px; padding:0 12px;
    color:var(--label); font-weight:600; font-size:11px; letter-spacing:.02em;
    text-transform:uppercase; vertical-align:middle; white-space:nowrap; overflow:hidden;
    border-bottom:1px solid var(--line);
  }
  thead .grp th.rspan{height:64px}
  thead .grp th.c-no, thead .grp th.c-project, thead .grp th.c-activities{
    position:sticky; top:0; z-index:60; background:var(--headbg);
  }
  thead .grp th.c-no{left:0; border-left:1px solid var(--line);
    border-top-left-radius:var(--card-radius); border-bottom-left-radius:var(--card-radius)}
  thead .grp th.c-project{left:var(--w-no)}
  thead .grp th.c-activities{left:calc(var(--w-no) + var(--w-project))}
  thead tr.grp th:last-child{border-top-right-radius:var(--card-radius); border-bottom-right-radius:var(--card-radius)}
  thead .cpgrp{text-transform:none; font-size:12px; color:var(--ink2); text-align:center}
  thead .cpgrp .cplabel{vertical-align:middle; cursor:default; display:inline-block}
  thead .cpgrp .cpmenu-btn{margin-left:6px; cursor:pointer; color:var(--label); width:14px;height:14px;display:inline-flex;vertical-align:middle;border-radius:5px}
  thead .cpgrp .cpmenu-btn:hover{background:#e2e2e8; color:var(--ink2)}
  thead .cpgrp .cpmenu-btn svg{width:100%;height:100%}

  /* ---------- active checkpoint highlight ---------- */
  thead .cpgrp.cp-active-h{background:#eef0ff; border-bottom-color:#d9d8f6}
  .cp-active-h .cplabel{background:rgba(94,92,230,.15); color:var(--indigo); font-weight:700; padding:3px 11px; border-radius:11px}
  .cp-active-h .cpmenu-btn{color:var(--indigo)}
  thead .sub.cp-active-sub{background:#f4f5ff; color:#7c82cc; border-bottom-color:#d9d8f6}
  td.cp-active-cell{background:#f6f7ff}

  /* frozen left columns — body */
  .c-no{position:sticky; left:0; z-index:30; width:var(--w-no); text-align:center; color:var(--label); font-weight:600}
  .c-project{position:sticky; left:var(--w-no); z-index:30; width:var(--w-project)}
  .c-activities{position:sticky; left:calc(var(--w-no) + var(--w-project)); z-index:30; width:var(--w-activities)}
  td.c-no, td.c-project, td.c-activities{background:var(--surface)}
  .c-activities{box-shadow:6px 0 8px -8px rgba(0,0,0,.16)}
  td.c-no{vertical-align:top; padding-top:14px; font-size:13px}

  /* ---------- per-project card edges ---------- */
  .rtop{border-top:1px solid var(--line)}
  td.blk-left{border-left:1px solid var(--line)}
  td.blk-tl{border-top-left-radius:var(--card-radius)}
  td.blk-bl{border-bottom-left-radius:var(--card-radius)}
  td.blk-tr{border-top-right-radius:var(--card-radius)}
  td.blk-br{border-bottom-right-radius:var(--card-radius)}
  tr.gaprow td.gap{background:var(--bg); border:none; height:14px; padding:0}

  /* ---------- project panel ---------- */
  td.c-project{padding:12px 13px}
  .pj-name{font-size:14.5px; font-weight:650; letter-spacing:-.01em; line-height:1.3; cursor:text; outline:none}
  .pj-desc{font-size:11.5px; color:var(--label); line-height:1.4; margin-top:7px; cursor:text; outline:none}
  .pj-bar-wrap{display:flex; align-items:center; gap:8px; margin:11px 0 9px}
  .pj-bar{flex:1; height:6px; border-radius:4px; background:#e7e7ec; overflow:hidden}
  .pj-bar > i{display:block; height:100%; background:var(--blue); border-radius:4px; transition:width .3s}
  .pj-pct{font-size:11.5px; font-weight:650; color:var(--ink2)}
  .pj-sum{font-size:11.5px; color:var(--ink2); line-height:1.9}
  .pj-sum .row{display:flex; align-items:center; gap:7px}
  .pj-sum .row .nm{flex:1; color:var(--ink2)}
  .pj-sum .row .ct{font-weight:600}
  .pj-sum .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .pj-total{display:flex; justify-content:space-between; border-top:1px solid var(--line); margin-top:7px; padding-top:7px; font-size:12px}
  .pj-total b{font-weight:700}
  .pj-total .muted{color:var(--label); font-weight:500; margin-left:4px}
  .pj-menu-btn{float:right; cursor:pointer; color:var(--label3); width:18px;height:18px;display:inline-flex;border-radius:6px; margin-left:6px}
  .pj-menu-btn:hover{background:#ececf1;color:var(--ink2)}
  .pj-menu-btn svg{width:100%;height:100%}

  /* ---------- activity cell ---------- */
  td.c-activities{padding-right:8px}
  .act-row{display:flex; align-items:flex-start; gap:6px}
  .act-name{flex:1; font-weight:550; font-size:13.5px; line-height:1.35; cursor:text; outline:none; white-space:pre-wrap}
  .act-del{flex:0 0 auto; cursor:pointer; color:var(--label3); width:16px;height:16px; opacity:0; transition:opacity .12s; margin-top:1px}
  tr:hover .act-del{opacity:.85}
  .act-del:hover{color:var(--red)}
  .act-del svg{width:100%;height:100%}

  /* ---------- work item / text cells ---------- */
  .cell-text{cursor:text; outline:none; min-height:18px; line-height:1.4; white-space:pre-wrap; font-size:13.5px}
  .cell-text.empty:before{content:attr(data-ph); color:var(--label3); font-style:italic}
  .cell-edit{width:100%; border:1.5px solid var(--blue); border-radius:7px; padding:6px 8px; font:inherit; font-size:13.5px; resize:vertical; outline:none; background:#fff; color:var(--ink)}

  /* ---------- status pill ---------- */
  .pill{display:inline-flex; align-items:center; justify-content:center; min-width:78px; padding:5px 12px;
    border-radius:14px; font-size:12px; font-weight:650; cursor:pointer; user-select:none;
    transition:transform .08s, filter .12s; white-space:nowrap}
  .pill:active{transform:scale(.94)}
  .pill.done{background:var(--green); color:#fff}
  .pill.prog{background:var(--amber); color:#fff}
  .pill.back{background:#fff; color:#6b6b70; border:1.4px solid #d3d3d9}
  .pill.cancel{background:var(--gray); color:#fff}
  td.c-st{text-align:center; vertical-align:middle}
  /* status dropdown pill + menu */
  .pill.pill-dd{gap:4px; padding-right:9px}
  .pill-caret{width:11px;height:11px;display:inline-flex;align-items:center;opacity:.75}
  .pill-caret svg{width:100%;height:100%}
  .status-menu{min-width:172px; padding:6px}
  .status-menu .st-item{padding:7px 9px}
  .status-menu .st-item .pill{min-width:92px; cursor:pointer}
  .status-menu .st-item .chk{margin-left:auto}

  /* drag-to-reorder */
  .act-grip{flex:0 0 auto; cursor:grab; color:var(--label3); width:15px;height:16px; opacity:0; transition:opacity .12s; margin-top:1px}
  tr:hover .act-grip{opacity:.6}
  .act-grip:hover{color:var(--ink2)}
  .act-grip:active{cursor:grabbing}
  .act-grip svg{width:100%;height:100%}
  .drag-float{position:fixed; pointer-events:none; z-index:500; opacity:.97;
    box-shadow:0 14px 34px rgba(0,0,0,.22); border-radius:9px; overflow:hidden; background:#fff}
  .drag-float td{position:static; background:#fff; box-shadow:none}
  .drag-float .drag-blank{background:transparent; border:none}
  tr.dragging-src > td{opacity:.32}
  tr.drop-before > td:not(.c-no):not(.c-project){box-shadow:inset 0 3px 0 -1px var(--indigo)}
  tr.drop-after  > td:not(.c-no):not(.c-project){box-shadow:inset 0 -3px 0 -1px var(--indigo)}

  /* ---------- add-checkpoint column ---------- */
  td.c-addcp{text-align:center; vertical-align:middle; background:#fafafc}
  .addcp-btn{display:inline-flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; color:var(--label); padding:6px}
  .addcp-btn .circ{width:38px;height:38px;border-radius:50%;border:1.6px solid #d3d3d9; display:flex;align-items:center;justify-content:center; transition:all .15s}
  .addcp-btn:hover .circ{border-color:var(--blue); color:var(--blue); background:#eaf2ff}
  .addcp-btn .circ svg{width:18px;height:18px}
  .addcp-btn .cap{font-size:11px; font-weight:600; color:var(--label)}

  /* ---------- collapsed checkpoint column ---------- */
  th.cp-collapsed-h{cursor:pointer; padding:0; text-align:center; width:40px}
  th.cp-collapsed-h:hover{background:#ececf1}
  .cpc-inner{display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:center; padding:6px 0}
  .cpc-chev{width:12px;height:12px;color:var(--label3)}
  .cpc-chev svg{width:100%;height:100%}
  .cpc-lbl{writing-mode:vertical-rl; transform:rotate(180deg); font-size:10.5px; font-weight:600; color:var(--label);
    white-space:nowrap; max-height:30px; overflow:hidden; text-transform:none; text-overflow:ellipsis}
  td.cp-collapsed-c{cursor:pointer; text-align:center; vertical-align:middle; width:40px; background:#fafafc}
  td.cp-collapsed-c:hover{background:#f1f1f6}
  .cpc-dot{display:inline-block; width:11px;height:11px;border-radius:50%; box-shadow:inset 0 0 0 .5px rgba(0,0,0,.12)}

  /* ---------- add activity row ---------- */
  tr.addrow td{background:var(--surface)}
  td.addact{padding:8px 12px}
  .addact-btn{display:inline-flex; align-items:center; gap:6px; cursor:pointer; color:var(--blue); font-size:13px; font-weight:600; padding:5px 9px; border-radius:8px}
  .addact-btn:hover{background:#eaf2ff}
  .addact-btn .ic{width:15px;height:15px}
  .addact-btn .ic svg{width:100%;height:100%}

  /* add project footer */
  .add-proj-wrap{padding:14px 0 0; position:sticky; left:0; z-index:10}
  .add-proj{display:flex; align-items:center; justify-content:center; gap:7px; width:100%; padding:12px;
    border:1.5px dashed var(--line2); border-radius:11px; background:transparent; cursor:pointer;
    color:var(--blue); font:inherit; font-size:13.5px; font-weight:600}
  .add-proj:hover{background:#eaf2ff; border-color:var(--blue)}
  .add-proj .ic{width:16px;height:16px}.add-proj .ic svg{width:100%;height:100%}

  /* ---------- date editor ---------- */
  .due-text{cursor:pointer; font-size:13px}
  .due-text.tbd{color:var(--label3); font-style:italic}
  .due-text .ic{width:13px;height:13px;display:inline-flex;vertical-align:-2px;margin-right:5px;color:var(--label3)}
  .due-text .ic svg{width:100%;height:100%}
  .date-edit{display:flex; gap:6px; align-items:center; flex-wrap:wrap}
  .date-edit input[type=date]{border:1.5px solid var(--blue); border-radius:7px; padding:5px 7px; font:inherit; font-size:12.5px}
  .mini-btn{font-size:11px; font-weight:600; padding:4px 8px; border-radius:7px; border:1px solid var(--line2); background:#fff; cursor:pointer}
  .mini-btn:hover{background:#f2f2f6}

  /* ---------- resizer ---------- */
  .rz{position:absolute; top:0; right:0; width:8px; height:100%; cursor:col-resize; z-index:36}
  .rz::after{content:""; position:absolute; right:1px; top:5px; bottom:5px; width:2px; border-radius:2px; background:transparent}
  .rz:hover::after{background:var(--blue)}

  /* ---------- empty + loading states ---------- */
  .state{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    padding:70px 20px; text-align:center; color:var(--label)}
  .state .state-ic{width:54px; height:54px; border-radius:16px; background:#fff; border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:var(--label3)}
  .state .state-ic svg{width:26px; height:26px}
  .state h2{margin:0; font-size:16px; font-weight:650; color:var(--ink2)}
  .state p{margin:0; font-size:13px; max-width:340px; line-height:1.5}
  .spinner{width:30px;height:30px;border:3px solid #e2e2e7;border-top-color:var(--indigo);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- menus & dialogs ---------- */
  .menu{position:fixed; z-index:200; background:rgba(255,255,255,.96); backdrop-filter:blur(20px) saturate(180%);
    border:1px solid var(--line); border-radius:13px; box-shadow:0 12px 40px rgba(0,0,0,.18); padding:6px; min-width:200px;
    animation:pop .14s ease}
  @keyframes pop{from{opacity:0; transform:scale(.95)}to{opacity:1; transform:scale(1)}}
  .mi{display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:8px; cursor:pointer; font-size:13.5px; color:var(--ink)}
  .mi:hover{background:#ececf1}
  .mi.danger{color:var(--red)}
  .mi .ic{width:16px;height:16px;display:inline-flex;color:var(--label)} .mi.danger .ic{color:var(--red)}
  .mi .ic svg{width:100%;height:100%}
  .mi .chk{margin-left:auto;color:var(--blue);width:15px;height:15px}.mi .chk svg{width:100%;height:100%}
  .msep{height:1px; background:var(--line); margin:5px 8px}

  .overlay{position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.32); display:flex; align-items:center; justify-content:center; animation:fade .15s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .dialog{background:#fff; border-radius:18px; width:340px; max-width:90vw; overflow:hidden; box-shadow:0 24px 70px rgba(0,0,0,.3); animation:pop .18s}
  .dialog .body{padding:22px 22px 16px; text-align:center}
  .dialog h3{margin:0 0 7px; font-size:17px; font-weight:650}
  .dialog p{margin:0; font-size:13.5px; color:var(--ink2); line-height:1.45}
  .dialog .acts{display:flex; border-top:1px solid var(--line)}
  .dialog .acts button{flex:1; border:none; background:transparent; padding:14px; font:inherit; font-size:15px; cursor:pointer; color:var(--blue)}
  .dialog .acts button + button{border-left:1px solid var(--line)}
  .dialog .acts button.danger{color:var(--red); font-weight:600}
  .dialog .acts button.bold{font-weight:650}
  .dialog .acts button:hover{background:#f6f6f8}

  .toast{position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
    background:rgba(28,28,30,.92); color:#fff; padding:11px 20px; border-radius:11px; font-size:13.5px; font-weight:550;
    z-index:400; transition:all .25s; backdrop-filter:blur(10px); pointer-events:none; max-width:80vw; text-align:center}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .toast.err{background:rgba(178,48,47,.95)}
</style>
</head>
<body>
  <div class="topbar">
    <div class="title-block">
      <div class="title-row"><h1>Project Tracker</h1><span class="ver">v2.1</span></div>
      <div class="subtitle">by ACC ONE Product Management</div>
    </div>
    <div class="spacer"></div>
    <span class="conn connecting" id="connBadge"><span class="conn-dot"></span><span class="conn-lbl">Connecting…</span></span>
    <button class="btn btn-light" id="exportBtn"><span class="ic" data-ic="download"></span>Export to Excel</button>
    <button class="btn btn-primary" id="addProjectBtn"><span class="ic" data-ic="plus"></span>Add Project</button>
  </div>

  <div class="wrap" id="wrap">
    <div class="state" id="bootState"><div class="spinner"></div><p>Connecting to Firestore…</p></div>
  </div>

  <div class="toast" id="toast"></div>

<!-- ===================================================================== -->
<!--  Main application module                                              -->

<script type="module">
/* =========================================================================
   Project Tracker — Firestore edition (v2.0)
   -------------------------------------------------------------------------
   Data model (normalized — NOT one giant document):

     meta/config
        { activeCp, checkpoints:[{id,label,collapsed}], colWidths:{} }

     projects/{projectId}
        { name, desc, hideProgress, order }

     projects/{projectId}/activities/{activityId}
        { name, next, due, note, order, cps:{ [cpId]:{wi,st} } }

   Each project and each activity is its own document, so a single edit
   writes only that document — no full-table rewrites, no 1 MB ceiling,
   and concurrent edits from different users no longer clobber each other.
   ========================================================================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  initializeFirestore, doc, collection, getDoc, setDoc, updateDoc, deleteDoc,
  onSnapshot, writeBatch, deleteField,
  persistentLocalCache, persistentMultipleTabManager
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

/* =========================================================================
   1. FIREBASE CONFIG  —  replace with your own project's values.
      (Firebase Console → Project settings → "Your apps" → Config)
   ========================================================================= */
const firebaseConfig = {
    apiKey: "AIzaSyC736u8OFuc-yS2f1j9vFb1xAKE9pMhkIQ",
    authDomain: "project-tracker-3deab.firebaseapp.com",
    projectId: "project-tracker-3deab",
    storageBucket: "project-tracker-3deab.firebasestorage.app",
    messagingSenderId: "366111364398",
    appId: "1:366111364398:web:8b5b47af6890a502ce96bf"
  };

const app = initializeApp(firebaseConfig);

/* Firestore with an offline cache that survives reloads and works across
   multiple browser tabs. Replaces the deprecated enableIndexedDbPersistence. */
const db = initializeFirestore(app, {
  localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
});

/* Firestore document / collection refs */
const cfgRef       = () => doc(db, "meta", "config");
const projRef      = (pid) => doc(db, "projects", pid);
const projCol      = () => collection(db, "projects");
const actRef       = (pid, aid) => doc(db, "projects", pid, "activities", aid);
const actCol       = (pid) => collection(db, "projects", pid, "activities");

/* =========================================================================
   Icons
   ========================================================================= */
const ICONS = {

/* =========================================================================
   Column widths
   ========================================================================= */
const DEFW = { no:46, project:230, activities:182, wi:200, st:122, addcp:108, next:190, due:132, note:170 };
function colW(key){
  if (DATA && DATA.colWidths && DATA.colWidths[key] != null) return DATA.colWidths[key];
  if (key.indexOf("wi:") === 0) return DEFW.wi;
  if (key.indexOf("st:") === 0) return DEFW.st;
  if (key.indexOf("cc:") === 0) return 40;
  return DEFW[key] || 120;
}

/* =========================================================================
   Local state — a live mirror of Firestore, assembled from the listeners.
   DATA keeps the exact shape the renderer expects.
   ========================================================================= */
let CONFIG = null;                  // meta/config document
const PROJECTS   = new Map();       // projectId -> { id, name, desc, hideProgress, order }
const ACTIVITIES = new Map();       // projectId -> Map(activityId -> activity)
const ACT_UNSUBS = new Map();       // projectId -> unsubscribe()
let DATA = null;                    // assembled view-model used by render()

let editKey = null;
let pendingRender = false;
let booted = false;
let dragState = null;            // active activity-row drag, or null

function uid(){ return Math.random().toString(36).slice(2,9); }

/* Rebuild the flat DATA object the renderer reads from. */
function rebuild(){
  if (!CONFIG){ DATA = null; return; }
  const projects = [...PROJECTS.values()]
    .sort((a,b)=> (a.order ?? 0) - (b.order ?? 0))
    .map(p => {
      const m = ACTIVITIES.get(p.id);
      const activities = m
        ? [...m.values()].sort((a,b)=> (a.order ?? 0) - (b.order ?? 0))
        : [];
      return Object.assign({}, p, { activities });
    });
  DATA = {
    activeCp:    CONFIG.activeCp,
    checkpoints: CONFIG.checkpoints || [],
    colWidths:   CONFIG.colWidths   || {},
    projects
  };
  if (DATA.checkpoints.length && !DATA.checkpoints.some(c => c.id === DATA.activeCp)){
    DATA.activeCp = DATA.checkpoints[DATA.checkpoints.length-1].id;
  }
}

/* Re-render, unless a text field is being edited (defer until blur). */
function scheduleRender(){
  rebuild();
  if (editKey || dragState){ pendingRender = true; return; }
  render();
}

/* =========================================================================
   Connection badge
   ========================================================================= */
let conn = "connecting";
function setConn(state){
  if (conn === state) return;
  conn = state;
  const b = document.getElementById("connBadge");
  if (!b) return;
  b.className = "conn " + state;
  const lbl = { connecting:"Connecting…", live:"Live", cached:"Offline (cached)", offline:"Offline" }[state] || state;
  b.querySelector(".conn-lbl").textContent = lbl;
}
window.addEventListener("offline", ()=> setConn("offline"));
window.addEventListener("online",  ()=> { if (conn === "offline") setConn("connecting"); });

/* =========================================================================
   Firestore listeners
   ========================================================================= */
async function ensureConfig(){
  const snap = await getDoc(cfgRef());
  if (!snap.exists()){
    const cpId = uid();
    await setDoc(cfgRef(), {
      activeCp: cpId,
      checkpoints: [{ id:cpId, label:"As of "+labelDate(new Date()), collapsed:false }],
      colWidths: {}
    });
  }
}

function subscribeConfig(){
  onSnapshot(cfgRef(), { includeMetadataChanges:true }, (snap)=>{
    if (snap.exists()) CONFIG = snap.data();
    markConn(snap);
    finishBoot();
    scheduleRender();
  }, fail);
}

function subscribeProjects(){
  onSnapshot(projCol(), { includeMetadataChanges:true }, (snap)=>{
    const seen = new Set();
    snap.forEach(d => { PROJECTS.set(d.id, Object.assign({ id:d.id }, d.data())); seen.add(d.id); });
    for (const id of [...PROJECTS.keys()]) if (!seen.has(id)) PROJECTS.delete(id);

    /* open / close per-project activity listeners */
    for (const id of seen) if (!ACT_UNSUBS.has(id)) subscribeActivities(id);
    for (const id of [...ACT_UNSUBS.keys()]) if (!seen.has(id)){
      ACT_UNSUBS.get(id)(); ACT_UNSUBS.delete(id); ACTIVITIES.delete(id);
    }
    markConn(snap);
    scheduleRender();
  }, fail);
}

function subscribeActivities(pid){
  const unsub = onSnapshot(actCol(pid), { includeMetadataChanges:true }, (snap)=>{
    let m = ACTIVITIES.get(pid);
    if (!m){ m = new Map(); ACTIVITIES.set(pid, m); }
    const seen = new Set();
    snap.forEach(d => { m.set(d.id, Object.assign({ id:d.id }, d.data())); seen.add(d.id); });
    for (const id of [...m.keys()]) if (!seen.has(id)) m.delete(id);
    markConn(snap);
    scheduleRender();
  }, fail);
  ACT_UNSUBS.set(pid, unsub);
}

function markConn(snap){
  if (!navigator.onLine){ setConn("offline"); return; }
  setConn(snap.metadata.fromCache ? "cached" : "live");
}
function finishBoot(){
  if (booted) return;
  booted = true;
  const bs = document.getElementById("bootState");
  if (bs) bs.remove();
}
function fail(err){
  console.error("Firestore error:", err);
  if (err && err.code === "permission-denied"){
    toast("Permission denied — check your Firestore security rules.", true);
  } else {
    toast("Sync error: " + (err && err.message ? err.message : err), true);
  }
}

/* =========================================================================
   Mutations  (optimistic local update → instant UI → write to Firestore)
   ========================================================================= */
async function patchConfig(patch){
  CONFIG = Object.assign({}, CONFIG, patch);
  scheduleRender();
  try { await setDoc(cfgRef(), patch, { merge:true }); } catch(e){ fail(e); }
}

function mutProject(pid, patch){
  const cur = PROJECTS.get(pid);
  if (cur) PROJECTS.set(pid, Object.assign({}, cur, patch));
  scheduleRender();
  setDoc(projRef(pid), patch, { merge:true }).catch(fail);
}

function setActivityField(pid, aid, field, value){
  const a = ACTIVITIES.get(pid) && ACTIVITIES.get(pid).get(aid);
  if (a) a[field] = value;
  scheduleRender();
  updateDoc(actRef(pid, aid), { [field]: value }).catch(fail);
}

function setCps(pid, aid, cpId, sub, value){
  const a = ACTIVITIES.get(pid) && ACTIVITIES.get(pid).get(aid);
  if (a){ a.cps = a.cps || {}; a.cps[cpId] = a.cps[cpId] || { wi:"", st:"backlog" }; a.cps[cpId][sub] = value; }
  scheduleRender();
  updateDoc(actRef(pid, aid), { ["cps."+cpId+"."+sub]: value }).catch(fail);
}

async function addProject(){
  const id = uid();
  const order = PROJECTS.size ? Math.max(...[...PROJECTS.values()].map(p=>p.order ?? 0)) + 1 : 0;
  const cps = {}; (CONFIG.checkpoints || []).forEach(c => cps[c.id] = { wi:"", st:"backlog" });
  try {
    const batch = writeBatch(db);
    batch.set(projRef(id), { name:"New Project", desc:"", hideProgress:false, order });
    batch.set(actRef(id, uid()), { name:"New Activity", next:"", due:"", note:"", order:0, cps });
    await batch.commit();
    toast("Project added");
  } catch(e){ fail(e); }
}

async function removeProject(pid){
  try {
    const m = ACTIVITIES.get(pid);
    const batch = writeBatch(db);
    if (m) for (const aid of m.keys()) batch.delete(actRef(pid, aid));
    batch.delete(projRef(pid));
    await batch.commit();
  } catch(e){ fail(e); }
}

async function addActivity(pid){
  const m = ACTIVITIES.get(pid);
  const order = m && m.size ? Math.max(...[...m.values()].map(a=>a.order ?? 0)) + 1 : 0;
  const cps = {}; (CONFIG.checkpoints || []).forEach(c => cps[c.id] = { wi:"", st:"backlog" });
  try { await setDoc(actRef(pid, uid()), { name:"New Activity", next:"", due:"", note:"", order, cps }); }
  catch(e){ fail(e); }
}

function removeActivity(pid, aid){ deleteDoc(actRef(pid, aid)).catch(fail); }

async function doAddCheckpoint(importPrev){
  const cps = CONFIG.checkpoints || [];
  const prev = cps[cps.length-1];
  const cp = { id:uid(), label:"As of "+labelDate(new Date()), collapsed:false };
  try {
    const batch = writeBatch(db);
    batch.set(cfgRef(), { checkpoints:[...cps, cp], activeCp:cp.id }, { merge:true });
    for (const [pid, m] of ACTIVITIES){
      for (const [aid, a] of m){
        const src = prev ? (a.cps && a.cps[prev.id]) : null;
        const val = (importPrev && src) ? { wi:src.wi||"", st:src.st||"backlog" } : { wi:"", st:"backlog" };
        batch.update(actRef(pid, aid), { ["cps."+cp.id]: val });
      }
    }
    await batch.commit();
    toast("Checkpoint added");
  } catch(e){ fail(e); }
}

async function removeCheckpoint(cpId){
  const cps = CONFIG.checkpoints || [];
  if (cps.length <= 1){ toast("Keep at least one checkpoint."); return; }
  const nextCps = cps.filter(c => c.id !== cpId);
  let activeCp = CONFIG.activeCp;
  if (activeCp === cpId) activeCp = nextCps[nextCps.length-1].id;
  try {
    const batch = writeBatch(db);
    batch.set(cfgRef(), { checkpoints:nextCps, activeCp }, { merge:true });
    for (const [pid, m] of ACTIVITIES)
      for (const aid of m.keys())
        batch.update(actRef(pid, aid), { ["cps."+cpId]: deleteField() });
    await batch.commit();
  } catch(e){ fail(e); }
}

function setCheckpointField(cpId, patch){
  const cps = (CONFIG.checkpoints || []).map(c => c.id === cpId ? Object.assign({}, c, patch) : c);
  patchConfig({ checkpoints:cps });
}
function makeActiveCheckpoint(cpId){
  const cps = (CONFIG.checkpoints || []).map(c => c.id === cpId ? Object.assign({}, c, { collapsed:false }) : c);
  patchConfig({ checkpoints:cps, activeCp:cpId });
}
function toggleHistory(){
  const expandedPast = (CONFIG.checkpoints || []).some(c => !c.collapsed && c.id !== CONFIG.activeCp);
  const cps = (CONFIG.checkpoints || []).map(c =>
    Object.assign({}, c, { collapsed: expandedPast ? (c.id !== CONFIG.activeCp) : false }));
  patchConfig({ checkpoints:cps });
}

/* =========================================================================
   Helpers
   ========================================================================= */
function el(tag, attrs, ...kids){
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs){
    if (k === "class") n.className = attrs[k];
    else if (k === "html") n.innerHTML = attrs[k];
    else if (k.startsWith("on") && typeof attrs[k] === "function") n.addEventListener(k.slice(2), attrs[k]);
    else if (attrs[k] != null) n.setAttribute(k, attrs[k]);
  }
  kids.flat().forEach(c => { if (c == null) return; n.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
  return n;
}
function icon(name, cls){ return el("span", { class:"ic "+(cls||""), html:ICONS[name]||"" }); }
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function labelDate(d){ return d.getDate()+" "+MONTHS[d.getMonth()]+" "+d.getFullYear(); }
function fmtDate(iso){ if(!iso) return "TBD"; const d=new Date(iso+"T00:00:00"); if(isNaN(d)) return "TBD"; return labelDate(d); }

function projStats(p){
  const cp = DATA.activeCp; const c = { backlog:0, prog:0, done:0, cancel:0 };
  p.activities.forEach(a => { const st = (a.cps && a.cps[cp] && a.cps[cp].st) || "backlog"; if (c[st] != null) c[st]++; });
  const total = p.activities.length;
  return { c, total, pct: total ? Math.round(c.done/total*100) : 0 };
}
function anyExpandedPast(){ return (DATA.checkpoints||[]).some(c => !c.collapsed && c.id !== DATA.activeCp); }

/* =========================================================================
   Render
   ========================================================================= */
function render(){
  const wrap = document.getElementById("wrap");
  if (!DATA){ return; }                       /* still booting */
  pendingRender = false;
  wrap.innerHTML = "";

  document.documentElement.style.setProperty("--w-no", colW("no")+"px");
  document.documentElement.style.setProperty("--w-project", colW("project")+"px");
  document.documentElement.style.setProperty("--w-activities", colW("activities")+"px");

  const grid = el("table", { class:"grid", id:"grid" });

  /* column count for full-width gap rows */
  let cpCols = 0; DATA.checkpoints.forEach(cp => cpCols += cp.collapsed ? 1 : 2);
  const totalCols = 3 + cpCols + 4;

  /* ----- colgroup ----- */
  const cg = el("colgroup");
  const addCol = (key,w)=>{ const c=el("col"); c.setAttribute("data-key",key); c.style.width=(w||colW(key))+"px"; cg.appendChild(c); };
  addCol("no"); addCol("project"); addCol("activities");
  DATA.checkpoints.forEach(cp => { if (cp.collapsed){ addCol("cc:"+cp.id, 40); } else { addCol("wi:"+cp.id); addCol("st:"+cp.id); } });
  addCol("addcp"); addCol("next"); addCol("due"); addCol("note");
  grid.appendChild(cg);

  /* ----- thead ----- */
  const thead = el("thead");
  const grp = el("tr", { class:"grp" });
  const thRz = (label,cls,key,extra)=>{ const th=el("th",Object.assign({class:cls},extra||{}),label);
    th.appendChild(el("div",{class:"rz", onmousedown:(e)=>startResize(e,key)})); return th; };

  grp.appendChild(el("th",{class:"grp c-no rspan", rowspan:2}, "No."));
  grp.appendChild(thRz("Project","grp c-project rspan","project",{rowspan:2}));
  grp.appendChild(thRz("Activities","grp c-activities rspan","activities",{rowspan:2}));

  DATA.checkpoints.forEach(cp => {
    if (cp.collapsed){
      const inner = el("div",{class:"cpc-inner"}, icon("chevRight","cpc-chev"),
        el("span",{class:"cpc-lbl"}, cp.label.replace(/^As of\s*/i,"")));
      grp.appendChild(el("th",{class:"grp cp-collapsed-h", rowspan:2, title:"Click to expand",
        onclick:()=>setCheckpointField(cp.id,{collapsed:false})}, inner));
    } else {
      const isActive = cp.id === DATA.activeCp;
      const head = el("th",{class:"grp cpgrp"+(isActive?" cp-active-h":""), colspan:2},
        el("span",{class:"cplabel"}, cp.label),
        el("span",{class:"cpmenu-btn", html:ICONS.chevDown, onclick:(e)=>checkpointMenu(e,cp)}));
      grp.appendChild(head);
    }
  });

  grp.appendChild(el("th",{class:"grp rspan", rowspan:2}, "Add Checkpoint"));
  grp.appendChild(thRz("Next Action","grp rspan","next",{rowspan:2}));
  grp.appendChild(thRz("Due Date","grp rspan","due",{rowspan:2}));
  grp.appendChild(thRz("Note/Remarks","grp rspan","note",{rowspan:2}));
  thead.appendChild(grp);

  const sub = el("tr",{class:"sub"});
  DATA.checkpoints.forEach(cp => {
    if (cp.collapsed) return;
    const act = cp.id === DATA.activeCp ? " cp-active-sub" : "";
    sub.appendChild(thRz("Work Item","sub"+act,"wi:"+cp.id));
    sub.appendChild(thRz("Status","sub"+act,"st:"+cp.id));
  });
  thead.appendChild(sub);
  grid.appendChild(thead);

  /* ----- tbody ----- */
  const tbody = el("tbody");
  DATA.projects.forEach((p,pi) => {
    tbody.appendChild(el("tr",{class:"gaprow"}, el("td",{class:"gap", colspan:totalCols})));
    const span = p.activities.length + 1;
    p.activities.forEach((a,ai) => {
      const first = ai === 0;
      const tr = el("tr",{class:"act-tr","data-pid":p.id,"data-aid":a.id});
      if (first){
        tr.appendChild(el("td",{class:"c-no blk-left blk-tl blk-bl rtop", rowspan:span}, String(pi+1)));
        tr.appendChild(projectCell(p,span));
      }
      const actTd = activityCell(p,a); if (first) actTd.classList.add("rtop"); tr.appendChild(actTd);

      DATA.checkpoints.forEach(cp => {
        const d = (a.cps && a.cps[cp.id]) || { wi:"", st:"backlog" };
        if (cp.collapsed){
          const td = el("td",{class:"cp-collapsed-c", title:STMETA[d.st||"backlog"].label+" — click to expand",
            onclick:()=>setCheckpointField(cp.id,{collapsed:false})},
            el("span",{class:"cpc-dot", style:"background:"+SUMDOT[d.st||"backlog"]}));
          if (first) td.classList.add("rtop"); tr.appendChild(td);
        } else {
          const isActive = cp.id === DATA.activeCp;
          const wiTd = workItemCell(p,a,cp), stTd = statusCell(p,a,cp);
          if (first){ wiTd.classList.add("rtop"); stTd.classList.add("rtop"); }
          if (isActive){ wiTd.classList.add("cp-active-cell"); stTd.classList.add("cp-active-cell"); }
          tr.appendChild(wiTd); tr.appendChild(stTd);
        }
      });

      if (first){
        tr.appendChild(el("td",{class:"c-addcp rtop", rowspan:span},
          el("div",{class:"addcp-btn", onclick:()=>addCheckpoint()},
            el("div",{class:"circ", html:ICONS.plus}), el("div",{class:"cap"},"Add Checkpoint"))));
      }

      const nx = textCell(p,a,"next","nx:"+p.id+":"+a.id,"Add next action..."); if (first) nx.classList.add("rtop"); tr.appendChild(nx);
      const du = dueCell(p,a);                                                if (first) du.classList.add("rtop"); tr.appendChild(du);
      const nt = textCell(p,a,"note","nt:"+p.id+":"+a.id,"Add note...");      if (first){ nt.classList.add("rtop"); nt.classList.add("blk-tr"); } tr.appendChild(nt);
      tbody.appendChild(tr);
    });

    /* add-activity row */
    const ar = el("tr",{class:"addrow"});
    ar.appendChild(el("td",{class:"c-activities addact"},
      el("div",{class:"addact-btn", onclick:()=>addActivity(p.id)}, icon("plus"), "Add Activity")));
    DATA.checkpoints.forEach(cp => { ar.appendChild(el("td")); if (!cp.collapsed) ar.appendChild(el("td")); });
    ar.appendChild(el("td")); ar.appendChild(el("td")); ar.appendChild(el("td",{class:"blk-br"}));
    tbody.appendChild(ar);
  });
  grid.appendChild(tbody);
  wrap.appendChild(grid);

  /* empty state */
  if (!DATA.projects.length){
    wrap.appendChild(el("div",{class:"state"},
      el("div",{class:"state-ic", html:ICONS.folder}),
      el("h2",null,"No projects yet"),
      el("p",null,"Add your first project to start tracking activities, checkpoints and progress.")));
  }

  /* add-project footer */
  wrap.appendChild(el("div",{class:"add-proj-wrap"},
    el("button",{class:"add-proj", onclick:()=>addProject()}, icon("plus"), "Add Project")));

  document.querySelectorAll("[data-ic]").forEach(s => { if (s.children.length === 0) s.innerHTML = ICONS[s.getAttribute("data-ic")] || ""; });

  if (editKey){
    const f = document.getElementById("editfield");
    if (f){
      f.focus();
      if (f.setSelectionRange){ const v=f.value; f.setSelectionRange(v.length,v.length); }
      if (f.tagName === "TEXTAREA"){
        const grow=()=>{ f.style.height="auto"; f.style.height=Math.max(f.scrollHeight,30)+"px"; };
        f.addEventListener("input",grow); grow();
      }
    }
  }
}

/* edit helpers */
function startEdit(key){ editKey = key; render(); }
function endEdit(){ editKey = null; render(); }

/* ---------- project cell ---------- */
function projectCell(p, span){
  const td = el("td",{class:"c-project rtop", rowspan:span});
  td.appendChild(el("span",{class:"pj-menu-btn", html:ICONS.dots, onclick:(e)=>projectMenu(e,p)}));

  if (editKey === "pn:"+p.id){
    const ta = el("textarea",{class:"cell-edit", id:"editfield", rows:1,

/* =========================================================================
   Drag-to-reorder activities (within a project)
   The floating preview carries the whole activity row EXCEPT the No.,
   Project and Add-Checkpoint cells (those stay put). On drop, the affected
   activities' `order` fields are rewritten in one batch.
   ========================================================================= */
function startActivityDrag(e, pid, aid, tr){
  if (e.button !== 0 || !tr) return;
  e.preventDefault();
  const grid = document.getElementById("grid");
  if (!grid) return;
  const gridRect = grid.getBoundingClientRect();
  const trRect = tr.getBoundingClientRect();
  const float = buildDragFloat(grid, tr);
  float.style.left  = gridRect.left + "px";
  float.style.top   = trRect.top + "px";
  float.style.width = grid.offsetWidth + "px";
  document.body.appendChild(float);
  tr.classList.add("dragging-src");
  dragState = { pid, aid, tr, float, offsetY: e.clientY - trRect.top, targetAid:null, after:false };
  document.body.style.userSelect = "none";
  document.body.style.cursor = "grabbing";
  window.addEventListener("mousemove", onActivityDragMove);
  window.addEventListener("mouseup", onActivityDragEnd);
}
function buildDragFloat(grid, tr){
  const float = el("table",{class:"grid drag-float"});
  const cg = grid.querySelector("colgroup");
  if (cg) float.appendChild(cg.cloneNode(true));
  const blank = ()=> el("td",{class:"drag-blank"});
  const row = el("tr");
  let actClone = null; const cpClones = []; const tailClones = [];
  [...tr.children].forEach(td => {
    if (td.classList.contains("c-no") || td.classList.contains("c-project") || td.classList.contains("c-addcp")) return;
    if (td.classList.contains("c-activities")) { actClone = td.cloneNode(true); return; }
    if (td.classList.contains("c-wi") || td.classList.contains("c-st") || td.classList.contains("cp-collapsed-c")) { cpClones.push(td.cloneNode(true)); return; }
    tailClones.push(td.cloneNode(true));
  });
  const scrub = (n)=>{ n.removeAttribute("rowspan"); n.querySelectorAll("[id]").forEach(x=>x.removeAttribute("id")); };
  row.appendChild(blank()); row.appendChild(blank());                         /* No., Project */
  if (actClone){ scrub(actClone); row.appendChild(actClone); } else row.appendChild(blank());
  cpClones.forEach(c => { scrub(c); row.appendChild(c); });
  row.appendChild(blank());                                                   /* Add Checkpoint */
  tailClones.forEach(c => { scrub(c); row.appendChild(c); });                 /* Next, Due, Note */
  const tb = el("tbody"); tb.appendChild(row); float.appendChild(tb);
  return float;
}
function clearDropIndicator(){
  document.querySelectorAll("tr.drop-before,tr.drop-after").forEach(r => r.classList.remove("drop-before","drop-after"));
}
function onActivityDragMove(e){
  if (!dragState) return;
  dragState.float.style.top = (e.clientY - dragState.offsetY) + "px";
  clearDropIndicator();
  const rows = [...document.querySelectorAll('tr.act-tr[data-pid="'+CSS.escape(dragState.pid)+'"]')];
  dragState.targetAid = null;
  for (const r of rows){
    const rc = r.getBoundingClientRect();
    if (e.clientY >= rc.top && e.clientY <= rc.bottom){
      const after = e.clientY > rc.top + rc.height/2;
      r.classList.add(after ? "drop-after" : "drop-before");
      dragState.targetAid = r.dataset.aid;
      dragState.after = after;
      break;
    }
  }
}
function onActivityDragEnd(){
  if (!dragState) return;
  const ds = dragState; dragState = null;
  ds.float.remove();
  ds.tr.classList.remove("dragging-src");
  clearDropIndicator();
  window.removeEventListener("mousemove", onActivityDragMove);
  window.removeEventListener("mouseup", onActivityDragEnd);
  document.body.style.userSelect = ""; document.body.style.cursor = "";
  if (ds.targetAid && ds.targetAid !== ds.aid){
    reorderActivity(ds.pid, ds.aid, ds.targetAid, ds.after);
  } else if (pendingRender){ render(); }
}
function reorderActivity(pid, aid, targetAid, after){
  const m = ACTIVITIES.get(pid); if (!m) return;
  let ids = [...m.values()].sort((a,b)=>(a.order??0)-(b.order??0)).map(x=>x.id).filter(id => id !== aid);
  let ti = ids.indexOf(targetAid); if (ti < 0) ti = ids.length; if (after) ti += 1;
  ids.splice(ti, 0, aid);
  const batch = writeBatch(db); let changed = 0;
  ids.forEach((id,i) => { const a = m.get(id); if (a && a.order !== i){ a.order = i; batch.update(actRef(pid,id), { order:i }); changed++; } });
  scheduleRender();
  if (changed) batch.commit().catch(fail);
}

function exportExcel(){
  if (typeof JSZip === "undefined"){ exportExcelFallback(); return; }
  const cps = DATA.checkpoints;
  const C = { no:0, project:1, desc:2, act:3 };
  const cpWi = [], cpSt = []; let idx = 4;
  cps.forEach(()=>{ cpWi.push(idx); cpSt.push(idx+1); idx += 2; });
  const nextIdx = idx, dueIdx = idx+1, noteIdx = idx+2, totalCols = idx+3;

  const W = new Array(totalCols).fill(14);
  W[0]=5; W[1]=26; W[2]=30; W[3]=22;
  cps.forEach((c,k)=>{ W[cpWi[k]]=26; W[cpSt[k]]=13; });
  W[nextIdx]=28; W[dueIdx]=13; W[noteIdx]=24;

  const L=(n)=>{ let s=""; n++; while(n>0){ let m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); } return s; };
  const xe=(s)=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const cT=(col,r,s,v)=>{ const ref=L(col)+r; if(v==null||v==="") return '<c r="'+ref+'" s="'+s+'"/>'; return '<c r="'+ref+'" s="'+s+'" t="inlineStr"><is><t xml:space="preserve">'+xe(v)+'</t></is></c>'; };
  const cN=(col,r,s,v)=>'<c r="'+L(col)+r+'" s="'+s+'"><v>'+v+'</v></c>';

  const merges = []; let rows = "";
  let r1 = '<row r="1">';
  r1 += cT(C.no,1,2,"No.")+cT(C.project,1,3,"Project")+cT(C.desc,1,3,"Description")+cT(C.act,1,3,"Activity");
  cps.forEach((cp,k)=>{ const active = cp.id === DATA.activeCp;
    r1 += cT(cpWi[k],1,active?5:4, cp.label+(active?"  \u25CF":""))+cT(cpSt[k],1,active?5:4,"");
    merges.push(L(cpWi[k])+"1:"+L(cpSt[k])+"1"); });
  r1 += cT(nextIdx,1,3,"Next Action")+cT(dueIdx,1,3,"Due Date")+cT(noteIdx,1,3,"Note/Remarks")+'</row>';
  rows += r1;
  [C.no,C.project,C.desc,C.act,nextIdx,dueIdx,noteIdx].forEach(c=>merges.push(L(c)+"1:"+L(c)+"2"));

  let r2 = '<row r="2">';
  cps.forEach((cp,k)=>{ r2 += cT(cpWi[k],2,3,"Work Item")+cT(cpSt[k],2,4,"Status"); });
  r2 += '</row>'; rows += r2;

  const stXf = { done:9, prog:10, cancel:11, backlog:12 };
  let r = 3;
  DATA.projects.forEach((p,pi)=>{
    const span = p.activities.length, firstR = r;
    p.activities.forEach((a,ai)=>{
      let row = '<row r="'+r+'">';
      if (ai===0){ row += cN(C.no,r,6,pi+1)+cT(C.project,r,7,p.name)+cT(C.desc,r,8,p.desc); }
      row += cT(C.act,r,7,a.name);
      cps.forEach((cp,k)=>{ const d=(a.cps&&a.cps[cp.id])||{}; const st=d.st||"backlog";
        row += cT(cpWi[k],r,1,d.wi||"")+cT(cpSt[k],r,stXf[st],STMETA[st].label); });
      row += cT(nextIdx,r,1,a.next||"")+cT(dueIdx,r,13,fmtDate(a.due))+cT(noteIdx,r,1,a.note||"")+'</row>';
      rows += row; r++;
    });
    if (span>1){ [C.no,C.project,C.desc].forEach(c=>merges.push(L(c)+firstR+":"+L(c)+(r-1))); }
  });

  let colsXml = '<cols>';
  for (let i=0;i<totalCols;i++) colsXml += '<col min="'+(i+1)+'" max="'+(i+1)+'" width="'+W[i]+'" customWidth="1"/>';
  colsXml += '</cols>';
  const mergeXml = '<mergeCells count="'+merges.length+'">'+merges.map(m=>'<mergeCell ref="'+m+'"/>').join("")+'</mergeCells>';
  const sheet = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetView/>'+colsXml+'<sheetData>'+rows+'</sheetData>'+mergeXml+'</worksheet>';
  const ct = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>';
  const rels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
  const wb = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Tracker" sheetId="1" r:id="rId1"/></sheets></workbook>';
  const wbr = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>';

  const zip = new JSZip();
  zip.file("[Content_Types].xml", ct);
  zip.folder("_rels").file(".rels", rels);
  const xl = zip.folder("xl");
  xl.file("workbook.xml", wb);
  xl.folder("_rels").file("workbook.xml.rels", wbr);
  xl.file("styles.xml", stylesXml());
  xl.folder("worksheets").file("sheet1.xml", sheet);
  zip.generateAsync({type:"blob"}).then(blob=>{
    const url = URL.createObjectURL(blob);
    const a = el("a",{href:url, download:"project-tracker.xlsx"});
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    toast("Exported to Excel");
  }).catch(()=>exportExcelFallback());
}
function exportExcelFallback(){
  const esc=(s)=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br/>");
  const XF={done:"#2BB24C",prog:"#F0A500",cancel:"#8A8A8E",backlog:"#FFFFFF"};
  const XT={done:"#fff",prog:"#fff",cancel:"#fff",backlog:"#6b6b70"};
  let h='<table border="1" cellspacing="0" cellpadding="6" style="border-collapse:collapse;font-family:Calibri,Arial,sans-serif;font-size:11pt">';
  h+='<tr><th rowspan="2" bgcolor="#EFEFF4">No.</th><th rowspan="2" bgcolor="#EFEFF4">Project</th><th rowspan="2" bgcolor="#EFEFF4">Description</th><th rowspan="2" bgcolor="#EFEFF4">Activity</th>';
  DATA.checkpoints.forEach(cp=>{ const a=cp.id===DATA.activeCp; h+='<th colspan="2" bgcolor="#EEEFFF" style="color:'+(a?"#5E5CE6":"#1c1c1e")+'">'+esc(cp.label)+(a?" \u25CF":"")+'</th>'; });
  h+='<th rowspan="2" bgcolor="#EFEFF4">Next Action</th><th rowspan="2" bgcolor="#EFEFF4">Due Date</th><th rowspan="2" bgcolor="#EFEFF4">Note/Remarks</th></tr><tr>';
  DATA.checkpoints.forEach(()=>{ h+='<th bgcolor="#EFEFF4">Work Item</th><th bgcolor="#EFEFF4">Status</th>'; });
  h+='</tr>';
  DATA.projects.forEach((p,pi)=>{ const span=p.activities.length;
    p.activities.forEach((a,ai)=>{ h+='<tr>';
      if(ai===0){ h+='<td rowspan="'+span+'" align="center" valign="top">'+(pi+1)+'</td><td rowspan="'+span+'" valign="top"><b>'+esc(p.name)+'</b></td><td rowspan="'+span+'" valign="top" style="color:#666">'+esc(p.desc)+'</td>'; }
      h+='<td valign="top"><b>'+esc(a.name)+'</b></td>';
      DATA.checkpoints.forEach(cp=>{ const d=(a.cps&&a.cps[cp.id])||{}; const st=d.st||"backlog";
        h+='<td valign="top">'+esc(d.wi)+'</td><td align="center" bgcolor="'+XF[st]+'" style="color:'+XT[st]+'"><b>'+esc(STMETA[st].label)+'</b></td>'; });
      h+='<td valign="top">'+esc(a.next)+'</td><td align="center" valign="top">'+esc(fmtDate(a.due))+'</td><td valign="top">'+esc(a.note)+'</td></tr>';
    });
  });
  h+='</table>';
  const html='<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"/></head><body>'+h+'</body></html>';
  const blob=new Blob(["\ufeff"+html],{type:"application/vnd.ms-excel"});
  const url=URL.createObjectURL(blob);
  const a=el("a",{href:url, download:"project-tracker.xls"});
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast("Exported (offline fallback)");
}

   Boot
   ========================================================================= */
document.getElementById("addProjectBtn").addEventListener("click", addProject);
document.getElementById("exportBtn").addEventListener("click", exportExcel);

(async function start(){
  try { await ensureConfig(); } catch(e){ fail(e); }
  subscribeConfig();
  subscribeProjects();
})();
